<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Seguridad | Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Bienvenidos</h1>
            <h2>Control de Seguridad</h2>
            
            <p style="color: var(--text-muted); margin-bottom: 20px; letter-spacing: 1px;">TIEMPO TRANSCURRIDO SIN ACCIDENTES</p>
            
            <div class="counter-grid">
                <div class="counter-item">
                    <div id="days" class="counter-value">0</div>
                    <div class="counter-label">Días</div>
                </div>
                <div class="counter-item">
                    <div id="hours" class="counter-value">0</div>
                    <div class="counter-label">Horas</div>
                </div>
                <div class="counter-item">
                    <div id="minutes" class="counter-value">0</div>
                    <div class="counter-label">Minutos</div>
                </div>
                <div id="sec-container" class="counter-item">
                    <div id="seconds" class="counter-value">0</div>
                    <div class="counter-label">Segundos</div>
                </div>
            </div>

            <div class="record-box">
                Récord Histórico: <strong>{{ record }} días</strong>
            </div>

            <div class="footer-text">
                "Nuestro objetivo es Cero Accidentes. La seguridad empieza con usted."
            </div>
        </div>
    </div>

    <!-- Acceso oculto para admin -->
    <div class="hidden-entry" ondblclick="window.location='/admin'"></div>

    <script>
        const startTime = new Date("{{ fecha_inicio }}").getTime();
        let lastDay = -1;

        function updateCounter() {
            const now = new Date().getTime();
            const diff = now - startTime;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            animateValue("days", d);
            animateValue("hours", h);
            animateValue("minutes", m);
            animateValue("seconds", s);

            if (d > lastDay && lastDay !== -1) {
                playSuccessSound();
                triggerPulse();
            }
            lastDay = d;
        }

        function animateValue(id, value) {
            const el = document.getElementById(id);
            const current = el.innerText;
            if (current != value) {
                el.innerText = value;
            }
        }

        function triggerPulse() {
            const card = document.querySelector('.card');
            card.classList.add('animate-pulse');
            setTimeout(() => card.classList.remove('animate-pulse'), 300);
        }

        function playSuccessSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch (e) {}
        }

        setInterval(updateCounter, 1000);
        updateCounter();
    </script>
</body>
</html>
