<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card" style="max-width: 500px; margin: auto;">
            <h1>Seguridad</h1>
            <h2>Acceso Admin</h2>

            <form action="{{ url_for('login') }}" method="post">
                <input type="password" name="password" placeholder="Contraseña de acceso" required autofocus>
                <br>
                <button type="submit" class="btn btn-primary" style="width: 100%; max-width: 300px;">Entrar al
                    Panel</button>
            </form>

            <a href="/" class="btn btn-secondary" style="margin-top: 20px;">Volver al Contador</a>
        </div>
    </div>
</body>

</html>
